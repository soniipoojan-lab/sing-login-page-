<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Profile Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="cssfile/index.css">
  
</head>
<body>

  <div class="card">
    <div class="header">
      <span class="badge">sing in</span>
      <h1>Create Profile</h1>
      <p class="subtitle">Fill in your details below to create your profile.</p>
    </div>

    <!-- ── Name ── -->
    <div class="field">
      <label for="name">Full Name</label>
      <input type="text" id="name" placeholder="name" autocomplete="name" />
    </div>

    <!-- ── Email ── -->
    <div class="field">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@example.com" autocomplete="email" />
    </div>

    <!-- ── Password ── -->
    <div class="field">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="new-password" />
      <p class="hint">Password must be at least 8 characters, include an uppercase letter, a number, and a special character.</p>
    </div>

    <div class="divider"></div>

    <!-- ── Phone: Country Code + Number ── -->
    <div class="field">
      <label>Phone Number</label>
      <div class="phone-row">
        <div class="select-wrap">
          <select id="country-code">
            <option value="">Dial Code</option>
          </select>
          <div class="spinner" id="spin-code"></div>
        </div>
        <input
          type="tel"
          id="phone"
          placeholder="Enter a phone number"
          autocomplete="tel"
          inputmode="numeric"
          pattern="\d*"
          oninput="this.value = this.value.replace(/[^0-9]/g, '')"
        />
      </div>
    </div>

    <div class="divider"></div>
                
    <!-- ── Country + State ── -->
    <div class="field">
      <div class="two-col">
        <div>
          <label for="country">Country</label>
          <div class="select-wrap">
            <select id="country">
              <option value="">Select Country</option>
            </select>
            <div class="spinner" id="spin-country"></div>
          </div>
        </div>
        <div>
          <label for="state">State / Province</label>
          <div class="select-wrap">
            <select id="state" disabled>
              <option value="">Select Country first</option>
            </select>
            <div class="spinner" id="spin-state"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── Save Button ── -->
    <button class="btn-save" id="save-btn" onclick="saveProfile()">
      <span class="btn-text">Save Profile</span>
      <span class="btn-loader">
        <span class="btn-loader-dot"></span>
        <span class="btn-loader-dot"></span>
        <span class="btn-loader-dot"></span>
      </span>
    </button>
    
    <button class="btn-view" type="button" onclick="window.location.href='/login'">
      View Saved Profiles
    </button>
  </div>

  <div id="toast" class="toast">
    <span id="toast-icon" class="toast-icon">✓</span>
    <span id="toast-msg">Message text</span>
  </div>

  <!-- Modal to show saved profiles -->
  <div id="dataModal" class="modal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:1000;align-items:center;justify-content:center;">
    <div style="background:white;border-radius:12px;padding:2rem;max-width:900px;max-height:80vh;overflow-y:auto;width:95%;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:1rem;">
        <h2>Recently Saved Profiles</h2>
        <button onclick="closeModal()" style="background:none;border:none;font-size:24px;cursor:pointer;">×</button>
      </div>
      <div id="noDataMessage" style="display:none;color:#666;padding:2rem;text-align:center;">No data found</div>
      <table id="dataTable" style="width:100%;border-collapse:collapse;">
        <thead style="background:#f5f5f5;">
          <tr>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">ID</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">Name</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">Email</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">Country</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">State</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">Code</th>
            <th style="padding:0.75rem;text-align:left;border-bottom:2px solid #ddd;">Phone</th>
          </tr>
        </thead>
        <tbody id="dataTableBody"></tbody>
      </table>
    </div>
  </div>

  <script src="javascript/index.js"></script>
</body>
</html>
